name: kchart

packages:
  - packages/*

scripts:
  format:
    run: dart run melos exec -- "dart format ."
    description: Run `dart format` in all packages.

  analyze:
    run: dart run melos exec -- "dart analyze --fatal-infos"
    description: Run `dart analyze` in all packages.

  test:
    run: dart run melos exec --dir-exists="test" -- "flutter test || dart test"
    description: Run tests in all packages.

  pana:
    run: dart run melos exec -- "pana --no-warning"
    description: Run `pana` in all packages.

  bootstrap:
    run: dart run melos bootstrap
    description: Bootstrap the workspace.
