# PROTECTED: No cambiar versiones ni flujos de CI sin justificacion en PR_JUSTIFICATION.md
# path: AshCandleChart/pubspec.yaml
# Workspace ROOT. Pub Workspaces (Dart 3.6+) + Melos 7.x.
# Riverpod 3.x + freezed 2.x estable + última versión de codegen.

name: ash_candle_chart_workspace
description: Workspace root for KChart V2 packages.
version: 0.1.0-dev.1
publish_to: none

environment:
  sdk: ">=3.11.5 <4.0.0"
  flutter: ">=3.41.7"

# === Pub Workspaces ===
workspace:
  - packages/ash_candle_chart_core
  - packages/ash_candle_chart_flutter
  - packages/ash_candle_chart_state

dev_dependencies:
  melos: ^7.0.0

melos:
  name: ash_candle_chart_workspace

  packages:
    - packages/*

  command:
    bootstrap:
      environment:
        sdk: ">=3.11.5 <4.0.0"
        flutter: ">=3.41.7"
      # Versiones COMPARTIDAS para todo el workspace
      dependencies:
        meta: ^1.18.2
        intl: ^0.19.0
        # Codegen toolchain — la trinidad
        freezed_annotation: ^3.0.0
        json_annotation: ^4.9.0
        # Riverpod 3.x (última estable)
        riverpod: ^3.2.1
        flutter_riverpod: ^3.3.1
        riverpod_annotation: ^4.0.2
      dev_dependencies:
        build_runner: ^2.4.13
        freezed: ^3.0.0
        json_serializable: ^6.8.0
        riverpod_generator: ^4.0.3
        test: ^1.25.15
        glados: ^1.1.7

    version:
      message: "chore(release): publish kchart packages"
      includeCommitId: true

  scripts:
    format:
      run: dart run melos exec -- "dart format ."
      description: Run `dart format` in all packages.

    #  analyze:
    #    run: dart run melos exec -- "dart analyze --fatal-infos"
    #    description: Run `dart analyze` in all packages.

    #  test:
    #    run: dart run melos exec --dir-exists="test" -- "flutter test || dart test"
    #    description: Run tests in all packages.

    pana:
      run: dart run melos exec -- "pana --no-warning"
      description: Run `pana` in all packages.

    #  bootstrap:
    #    run: dart run melos bootstrap
    #    description: Bootstrap the workspace.

    build:
      description: "Run build_runner once across packages that need it."
      run: dart run build_runner build --delete-conflicting-outputs
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: build_runner

    watch:
      description: "Run build_runner in watch mode."
      run: dart run build_runner watch --delete-conflicting-outputs
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: build_runner

    analyze:
      description: "Static analysis exhaustively across all nested packages."
      run: |
        dart analyze . && \
        dart analyze examples/crypto_dashboard && \
        dart analyze packages/ash_candle_chart_core/example && \
        dart analyze packages/ash_candle_chart_flutter/example && \
        dart analyze packages/ash_candle_chart_state/example && \
        melos exec -- "dart analyze ."

    test:flutter:
      description: "Run Flutter tests."
      run: flutter test
      exec:
        concurrency: 1
      packageFilters:
        flutter: true
        dirExists: test

    test:dart:
      description: "Run pure Dart tests."
      run: dart test
      exec:
        concurrency: 4
      packageFilters:
        no-flutter: true
        dirExists: test
