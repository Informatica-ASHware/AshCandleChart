name: kchart_riverpod
description: Riverpod 3 integration for kchart, providing easy-to-use providers for controllers and chart frames. Optimized for reactive financial applications.
version: 0.1.0-dev.1
repository: https://github.com/your-repo/kchart
homepage: https://github.com/your-repo/kchart/tree/main/packages/kchart_riverpod
issue_tracker: https://github.com/your-repo/kchart/issues

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  kchart_core:
    path: ../kchart_core
  kchart_flutter:
    path: ../kchart_flutter
  riverpod: ^3.0.0-dev.0
  flutter_riverpod: ^3.0.0-dev.0
  meta: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
