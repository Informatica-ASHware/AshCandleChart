name: kchart_flutter
description: Flutter implementation of kchart, optimized for high performance. Features high-fps rendering and multi-threaded calculations.
version: 0.1.0-dev.1
repository: https://github.com/your-repo/kchart
homepage: https://github.com/your-repo/kchart/tree/main/packages/kchart_flutter
issue_tracker: https://github.com/your-repo/kchart/issues

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  kchart_core:
    path: ../kchart_core
  meta: ^1.11.0
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.2
