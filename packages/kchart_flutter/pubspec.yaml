issue_tracker: https://github.com/Informatica-ASHware/KChart2/issues

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  kchart_core: any         # workspace member
  intl: any
  meta: any
  freezed_annotation: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: any
  freezed: any
